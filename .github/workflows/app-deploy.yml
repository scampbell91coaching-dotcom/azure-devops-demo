name: Application CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "tests/**"
      - "Dockerfile"
      - "pytest.ini"
      - ".dockerignore"
      - ".github/workflows/app-deploy.yml"

  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "Dockerfile"
      - "pytest.ini"
      - ".dockerignore"
      - ".github/workflows/app-deploy.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: stevedevopslab6280
  ACR_LOGIN_SERVER: stevedevopslab6280.azurecr.io
  IMAGE_NAME: flask-web

jobs:
  test:
    name: Test application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements-dev.txt

      - name: Run tests
        run: pytest -v

  build-and-push:
    name: Build, scan and publish image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate image metadata
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_sha_tag=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.sha_tag }}" \
            --tag "${{ steps.meta.outputs.full_sha_tag }}" \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.full_sha_tag }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          scanners: vuln

      - name: Azure login using OIDC
        if: github.event_name != 'pull_request'
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get temporary ACR access token
        if: github.event_name != 'pull_request'
        id: acr-token
        shell: bash
        run: |
          ACR_TOKEN="$(
            az acr login \
              --name "$ACR_NAME" \
              --expose-token \
              --output tsv \
              --query accessToken
          )"

          echo "::add-mask::$ACR_TOKEN"
          echo "token=$ACR_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: 00000000-0000-0000-0000-000000000000
          password: ${{ steps.acr-token.outputs.token }}

      - name: Push immutable image tags
        if: github.event_name != 'pull_request'
        run: |
          docker push "${{ steps.meta.outputs.sha_tag }}"
          docker push "${{ steps.meta.outputs.full_sha_tag }}"

      - name: Tag and push latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag \
            "${{ steps.meta.outputs.full_sha_tag }}" \
            "${{ steps.meta.outputs.latest_tag }}"

          docker push "${{ steps.meta.outputs.latest_tag }}"

      - name: Publish image summary
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "## Container image published"
            echo
            echo "\`${{ steps.meta.outputs.full_sha_tag }}\`"
            echo
            echo "\`${{ steps.meta.outputs.sha_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
