name: Application CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "tests/**"
      - "scripts/**"
      - "Dockerfile"
      - "pytest.ini"
      - ".dockerignore"
      - ".github/workflows/app-deploy.yml"

  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "scripts/**"
      - "Dockerfile"
      - "pytest.ini"
      - ".dockerignore"
      - ".github/workflows/app-deploy.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: stevedevopslab6280
  ACR_LOGIN_SERVER: stevedevopslab6280.azurecr.io
  IMAGE_NAME: flask-web
  APP_URL: https://23.102.98.97

jobs:
  test:
    name: Test application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dependencies
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          pip install -r app/requirements-dev.txt

      - name: Run tests
        run: |
          set -euo pipefail
          pytest -v

  build-and-push:
    name: Build, scan and publish image
    needs: test
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.full_sha_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate image metadata
        id: meta
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"

          echo "sha_tag=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_sha_tag=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          set -euo pipefail

          docker build \
            -t "${{ steps.meta.outputs.sha_tag }}" \
            -t "${{ steps.meta.outputs.full_sha_tag }}" \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.full_sha_tag }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Azure Login
        if: github.event_name != 'pull_request'
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR token
        if: github.event_name != 'pull_request'
        id: acr
        run: |
          set -euo pipefail

          TOKEN=$(az acr login \
            --name "$ACR_NAME" \
            --expose-token \
            --query accessToken \
            --output tsv)

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: 00000000-0000-0000-0000-000000000000
          password: ${{ steps.acr.outputs.token }}

      - name: Push images
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail

          docker push "${{ steps.meta.outputs.sha_tag }}"
          docker push "${{ steps.meta.outputs.full_sha_tag }}"

          docker tag \
            "${{ steps.meta.outputs.full_sha_tag }}" \
            "${{ steps.meta.outputs.latest_tag }}"

          docker push "${{ steps.meta.outputs.latest_tag }}"

  deploy:
    name: Deploy to Azure VM
    needs: build-and-push
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy application
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          set -euo pipefail

          SCRIPT=$(base64 -w0 scripts/deploy-vm.sh)

          az vm run-command invoke \
            --resource-group rg-devops-assessment-lab \
            --name vm-web \
            --command-id RunShellScript \
            --scripts "
              set -e
              echo '$SCRIPT' | base64 -d > /tmp/deploy-vm.sh
              chmod +x /tmp/deploy-vm.sh
              /tmp/deploy-vm.sh '$IMAGE'
            "

  smoke-test:
    name: Verify production deployment
    needs: deploy
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Wait for application health endpoint
        run: |
          set -euo pipefail

          HEALTH_URL="${APP_URL}/health"
          RESPONSE_FILE=$(mktemp)

          echo "Testing production endpoint: ${HEALTH_URL}"

          # The IP address does not match a normal public TLS certificate,
          # so --insecure is currently required. Remove it after adding a
          # proper DNS hostname and trusted certificate.
          curl \
            --insecure \
            --fail-with-body \
            --silent \
            --show-error \
            --location \
            --retry 12 \
            --retry-delay 5 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 20 \
            --output "$RESPONSE_FILE" \
            "$HEALTH_URL"

          echo "Health endpoint response:"
          cat "$RESPONSE_FILE"
          echo

          python - "$RESPONSE_FILE" <<'PY'
          import json
          import pathlib
          import sys

          response_file = pathlib.Path(sys.argv[1])

          try:
              payload = json.loads(response_file.read_text())
          except json.JSONDecodeError as exc:
              raise SystemExit(
                  f"Health endpoint did not return valid JSON: {exc}"
              )

          if payload.get("status") != "healthy":
              raise SystemExit(
                  f"Unexpected health response: {payload!r}"
              )

          print("Production smoke test passed: application is healthy.")
          PY

  rollback:
    name: Roll back failed production deployment
    needs:
      - deploy
      - smoke-test
    runs-on: ubuntu-latest

    if: >
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.deploy.result == 'success' &&
      needs.smoke-test.result == 'failure'

    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Restore previous container image
        run: |
          set -euo pipefail

          SCRIPT=$(base64 -w0 scripts/rollback-vm.sh)

          az vm run-command invoke \
            --resource-group rg-devops-assessment-lab \
            --name vm-web \
            --command-id RunShellScript \
            --scripts "
              set -e
              echo '$SCRIPT' | base64 -d > /tmp/rollback-vm.sh
              chmod +x /tmp/rollback-vm.sh
              /tmp/rollback-vm.sh
            "

      - name: Verify restored public endpoint
        run: |
          set -euo pipefail

          HEALTH_URL="${APP_URL}/health"
          RESPONSE_FILE=$(mktemp)

          curl \
            --insecure \
            --fail-with-body \
            --silent \
            --show-error \
            --location \
            --retry 12 \
            --retry-delay 5 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 20 \
            --output "${RESPONSE_FILE}" \
            "${HEALTH_URL}"

          cat "${RESPONSE_FILE}"
          echo

          python - "${RESPONSE_FILE}" <<'PY'
          import json
          import pathlib
          import sys

          response_file = pathlib.Path(sys.argv[1])
          payload = json.loads(response_file.read_text())

          if payload.get("status") != "healthy":
              raise SystemExit(
                  f"Rollback endpoint is not healthy: {payload!r}"
              )

          print("External rollback verification passed.")
          PY
