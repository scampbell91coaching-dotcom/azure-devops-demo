name: Application CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "tests/**"
      - "scripts/**"
      - "Dockerfile"
      - "pytest.ini"
      - ".dockerignore"
      - ".github/workflows/app-deploy.yml"

  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "scripts/**"
      - "Dockerfile"
      - "pytest.ini"
      - ".dockerignore"
      - ".github/workflows/app-deploy.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: stevedevopslab6280
  ACR_LOGIN_SERVER: stevedevopslab6280.azurecr.io
  IMAGE_NAME: flask-web

jobs:
  test:
    name: Test application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements-dev.txt

      - name: Run tests
        run: pytest -v

  build-and-push:
    name: Build, scan and publish image
    needs: test
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.full_sha_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "sha_tag=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_sha_tag=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.sha_tag }}" \
            -t "${{ steps.meta.outputs.full_sha_tag }}" \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.full_sha_tag }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Azure Login
        if: github.event_name != 'pull_request'
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR token
        if: github.event_name != 'pull_request'
        id: acr
        run: |
          TOKEN=$(az acr login \
            --name "$ACR_NAME" \
            --expose-token \
            --query accessToken \
            -o tsv)

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: 00000000-0000-0000-0000-000000000000
          password: ${{ steps.acr.outputs.token }}

      - name: Push images
        if: github.event_name != 'pull_request'
        run: |
          docker push "${{ steps.meta.outputs.sha_tag }}"
          docker push "${{ steps.meta.outputs.full_sha_tag }}"

          docker tag \
            "${{ steps.meta.outputs.full_sha_tag }}" \
            "${{ steps.meta.outputs.latest_tag }}"

          docker push "${{ steps.meta.outputs.latest_tag }}"

  deploy:
    name: Deploy to Azure VM
    needs: build-and-push
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          SCRIPT=$(base64 -w0 scripts/deploy-vm.sh)

          az vm run-command invoke \
            --resource-group rg-devops-assessment-lab \
            --name vm-web \
            --command-id RunShellScript \
            --scripts "
              echo '$SCRIPT' | base64 -d >/tmp/deploy-vm.sh
              chmod +x /tmp/deploy-vm.sh
              /tmp/deploy-vm.sh '$IMAGE'
            "
