trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

stages:
  - stage: CI
    displayName: Build and test
    jobs:
      - job: BuildAndTest
        displayName: Build and test application
        pool:
          vmImage: ubuntu-latest

        steps:
          - checkout: self

          - script: |
              python3 -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: Install Python dependencies

          - script: |
              python3 -m py_compile app.py
            displayName: Validate Python syntax

          - script: |
              docker build \
                --tag flask-web:$(Build.BuildId) \
                --tag flask-web:latest \
                .
            displayName: Build Docker image

          - script: |
              docker run -d \
                --name flask-ci-test \
                -p 127.0.0.1:5000:5000 \
                flask-web:$(Build.BuildId)

              for attempt in {1..10}; do
                if curl --fail http://127.0.0.1:5000/health; then
                  exit 0
                fi

                sleep 2
              done

              docker logs flask-ci-test
              exit 1
            displayName: Test container health endpoint

          - script: |
              docker rm -f flask-ci-test 2>/dev/null || true
            displayName: Clean up test container
            condition: always()

  - stage: CD
    displayName: Deploy to Azure VM
    dependsOn: CI
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        ne(variables['Build.Reason'], 'PullRequest')
      )

    jobs:
      - deployment: DeployToVM
        displayName: Deploy Flask container
        environment: production

        pool:
          vmImage: ubuntu-latest

        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: CopyFilesOverSSH@0
                  displayName: Copy application files to VM
                  inputs:
                    sshEndpoint: vm-web-ssh
                    sourceFolder: $(Build.SourcesDirectory)
                    contents: |
                      app.py
                      requirements.txt
                      Dockerfile
                    targetFolder: /home/azureadmin/app
                    overwrite: true

                - task: SSH@0
                  displayName: Rebuild and deploy container
                  inputs:
                    sshEndpoint: vm-web-ssh
                    runOptions: inline
                    inline: |
                      set -e

                      cd /home/azureadmin/app

                      docker build \
                        --tag flask-web:$(Build.BuildId) \
                        --tag flask-web:latest \
                        .

                      docker rm -f flask-web 2>/dev/null || true

                      docker run -d \
                        --name flask-web \
                        -p 127.0.0.1:5000:5000 \
                        --restart unless-stopped \
                        flask-web:$(Build.BuildId)

                      for attempt in $(seq 1 15); do
                        if curl --fail --silent http://127.0.0.1:5000/health; then
                          echo "Deployment health check passed"
                          exit 0
                        fi

                        sleep 2
                      done

                      echo "Deployment health check failed"
                      docker logs flask-web
                      exit 1
                    readyTimeout: '20000'

                - task: SSH@0
                  displayName: Remove unused Docker images
                  condition: succeeded()
                  inputs:
                    sshEndpoint: vm-web-ssh
                    runOptions: inline
                    inline: |
                      docker image prune -f