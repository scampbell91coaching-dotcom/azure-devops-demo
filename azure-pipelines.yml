trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

- task: UsePythonVersion@0
  displayName: Use Python 3.12
  inputs:
    versionSpec: "3.12"

- script: |
    python -m pip install --upgrade pip
    pip install -r app/requirements.txt
  displayName: Install Python dependencies

- script: |
    python -m py_compile app/app.py
  displayName: Validate Python syntax

- script: |
    docker build \
      --tag flask-web:$(Build.BuildId) \
      --tag flask-web:latest \
      .
  displayName: Build Docker image

- script: |
    docker rm -f flask-ci-test >/dev/null 2>&1 || true

    docker run -d \
      --name flask-ci-test \
      -p 127.0.0.1:5000:5000 \
      flask-web:$(Build.BuildId)
  displayName: Start test container

- script: |
    for attempt in $(seq 1 15); do
      if curl \
        --silent \
        --fail \
        http://127.0.0.1:5000/health >/dev/null; then
        echo "CI health check passed."
        exit 0
      fi

      echo "Health check attempt ${attempt} failed."
      sleep 2
    done

    echo "CI health check failed."
    docker ps -a
    docker logs flask-ci-test
    exit 1
  displayName: Test container health endpoint

- script: |
    docker rm -f flask-ci-test >/dev/null 2>&1 || true
  displayName: Clean up test container
  condition: always()

- task: CopyFilesOverSSH@0
  displayName: Copy application files to VM
  inputs:
    sshEndpoint: vm-web-ssh
    sourceFolder: "$(Build.SourcesDirectory)"
    contents: |
      app/**
      Dockerfile
      .dockerignore
    targetFolder: "/home/azureadmin/app"
    cleanTargetFolder: true
    overwrite: true

- task: SSH@0
  displayName: Deploy application
  inputs:
    sshEndpoint: vm-web-ssh
    runOptions: inline
    failOnStdErr: false
    readyTimeout: "20000"
    inline: |
      set -e

      cd /home/azureadmin/app

      echo "Building production image..."

      docker build \
        -t flask-web:$(Build.BuildId) \
        -t flask-web:latest \
        .

      echo "Removing existing container..."

      docker rm -f flask-web >/dev/null 2>&1 || true

      echo "Starting production container..."

      docker run -d \
        --name flask-web \
        --restart unless-stopped \
        -p 127.0.0.1:5000:5000 \
        flask-web:$(Build.BuildId)

      echo "Waiting for production health check..."

      for attempt in $(seq 1 20); do
        if curl \
          --silent \
          --fail \
          http://127.0.0.1:5000/health >/dev/null; then
          echo "Deployment successful."
          docker ps --filter name=flask-web
          exit 0
        fi

        echo "Production health check attempt ${attempt} failed."
        sleep 2
      done

      echo "Deployment failed."
      docker ps -a --filter name=flask-web
      docker logs --tail 100 flask-web
      exit 1
