trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:

# Checkout repository
- checkout: self

# Install Python
- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.12'

# Install dependencies
- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: Install Python dependencies

# Validate Python
- script: |
    python -m py_compile app.py
  displayName: Validate Python syntax

# Build Docker image
- script: |
    docker build \
      -t flask-web:$(Build.BuildId) \
      -t flask-web:latest \
      .
  displayName: Build Docker image

# Start temporary test container
- script: |
    docker run -d \
      --name flask-ci-test \
      -p 127.0.0.1:5000:5000 \
      flask-web:$(Build.BuildId)
  displayName: Start test container

# Wait for health check
- script: |
    for i in {1..15}; do
      if curl --fail http://127.0.0.1:5000/health; then
        echo "Health check passed"
        exit 0
      fi
      sleep 2
    done

    docker logs flask-ci-test
    exit 1
  displayName: Test application health

# Remove test container
- script: |
    docker rm -f flask-ci-test || true
  displayName: Remove test container
  condition: always()

# Copy files to production VM
- task: CopyFilesOverSSH@0
  displayName: Copy application to VM
  inputs:
    sshEndpoint: vm-web-ssh
    sourceFolder: '$(Build.SourcesDirectory)'
    contents: |
      app.py
      requirements.txt
      Dockerfile
      .dockerignore
    targetFolder: '/home/azureadmin/app'
    cleanTargetFolder: true
    overwrite: true

# Deploy on VM
- task: SSH@0
  displayName: Deploy application
  inputs:
    sshEndpoint: vm-web-ssh
    runOptions: inline
    inline: |
      set -e

      cd /home/azureadmin/app

      echo "Building production image..."

      docker build \
        -t flask-web:$(Build.BuildId) \
        -t flask-web:latest \
        .

      echo "Stopping old container..."

      docker rm -f flask-web || true

      echo "Starting new container..."

      docker run -d \
        --name flask-web \
        --restart unless-stopped \
        -p 127.0.0.1:5000:5000 \
        flask-web:$(Build.BuildId)

      echo "Waiting for application..."

      for i in {1..15}; do
        if curl --fail http://127.0.0.1:5000/health; then
          echo "Deployment successful"
          exit 0
        fi
        sleep 2
      done

      docker logs flask-web
      exit 1

    readyTimeout: '20000'