trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:

# Checkout source
- checkout: self

# Install Python
- task: UsePythonVersion@0
  displayName: "Use Python 3.12"
  inputs:
    versionSpec: "3.12"

# Install dependencies
- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: "Install dependencies"

# Validate syntax
- script: |
    python -m py_compile app.py
  displayName: "Validate Python"

# Build Docker image
- script: |
    docker build \
      -t flask-web:$(Build.BuildId) \
      -t flask-web:latest \
      .
  displayName: "Build Docker image"

# Run temporary container
- script: |
    docker rm -f flask-ci-test >/dev/null 2>&1 || true

    docker run -d \
      --name flask-ci-test \
      -p 5000:5000 \
      flask-web:$(Build.BuildId)
  displayName: "Start test container"

# Health check
- script: |
    for i in $(seq 1 15); do
      if curl --silent --fail http://127.0.0.1:5000/health; then
        echo
        echo "Health check passed."
        exit 0
      fi

      echo "Waiting..."
      sleep 2
    done

    echo "Health check failed."
    docker logs flask-ci-test

    exit 1
  displayName: "Test application"

# Cleanup
- script: |
    docker rm -f flask-ci-test >/dev/null 2>&1 || true
  displayName: "Remove test container"
  condition: always()

# Copy files to VM
- task: CopyFilesOverSSH@0
  displayName: "Copy application to VM"
  inputs:
    sshEndpoint: "vm-web-ssh"
    sourceFolder: "$(Build.SourcesDirectory)"
    contents: |
      app.py
      requirements.txt
      Dockerfile
      .dockerignore
    targetFolder: "/home/azureadmin/app"
    overwrite: true
    cleanTargetFolder: true

# Deploy
- task: SSH@0
  displayName: "Deploy application"
  inputs:
    sshEndpoint: "vm-web-ssh"
    runOptions: "inline"
    failOnStdErr: false
    readyTimeout: "20000"
    inline: |
      set -e

      cd /home/azureadmin/app

      echo "Building image..."

      docker build \
        -t flask-web:$(Build.BuildId) \
        -t flask-web:latest \
        .

      echo "Stopping existing container..."

      docker rm -f flask-web >/dev/null 2>&1 || true

      echo "Starting new container..."

      docker run -d \
        --name flask-web \
        --restart unless-stopped \
        -p 127.0.0.1:5000:5000 \
        flask-web:$(Build.BuildId)

      echo "Waiting for application..."

      for i in $(seq 1 20); do
        if curl --silent --fail http://127.0.0.1:5000/health >/dev/null; then
          echo "Deployment successful."
          curl --silent http://127.0.0.1:5000/health
          echo
          exit 0
        fi

        sleep 2
      done

      echo "Deployment failed."

      docker ps -a

      docker logs flask-web

      exit 1